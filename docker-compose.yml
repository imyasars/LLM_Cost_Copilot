version: "3.9"

services:
  api:
    build: .
    container_name: llm_autopilot_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # persist SQLite DB outside container
      - ./routing:/app/routing    # allow hot-swap of routing_config.yaml
    restart: unless-stopped

  dashboard:
    build: .
    container_name: llm_autopilot_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
