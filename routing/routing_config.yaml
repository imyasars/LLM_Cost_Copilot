# Routing configuration — maps complexity tiers to model IDs.
# Edit this file to hot-swap models without any code changes.
#
# primary:   the first model tried for this tier
# fallbacks: ordered list — tried in sequence if primary fails
# models are ordered cheapest → most expensive within each tier

routing:
  1:
    tier_name: "Simple"
    description: "Reformatting, extraction, basic Q&A, look-up"
    primary: "gemini-flash"        # $0.075/1M — cheapest cloud
    fallbacks:
      - "llama-3-8b"               # $0.06/1M
      - "claude-haiku-3.5"         # $0.80/1M
      - "gpt-4o-mini"              # $0.15/1M
      - "qwen-coder-1.5b"          # $0.00 — local Ollama

  2:
    tier_name: "Moderate"
    description: "Summarization, classification, structured analysis"
    primary: "gpt-4o-mini"         # $0.15/1M — best value for moderate tasks
    fallbacks:
      - "deepseek-v3"              # $0.27/1M
      - "gemini-pro"               # $1.25/1M
      - "claude-haiku-3.5"         # $0.80/1M
      - "qwen-coder-14b"           # $0.00 — local Ollama

  3:
    tier_name: "Complex"
    description: "Multi-step reasoning, creative generation, nuanced judgment"
    primary: "gpt-4o"              # $5.00/1M — most capable
    fallbacks:
      - "claude-sonnet-4.5"        # $3.00/1M
      - "deepseek-r1"              # $0.80/1M — strong reasoning
      - "gemini-pro"               # $1.25/1M
